<div class="stars" [attr.aria-label]="'Rating: ' + rating() + ' out of 5'">
  @for (star of stars(); track $index) {
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="star">
      @if (star === 'full') {
        <polygon class="full" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      } @else if (star === 'half') {
        <defs>
          <linearGradient [id]="'half-' + $index">
            <stop offset="50%" stop-color="#f5a623"/>
            <stop offset="50%" stop-color="transparent"/>
          </linearGradient>
        </defs>
        <polygon class="empty" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
        <polygon [attr.fill]="'url(#half-' + $index + ')'" class="half" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      } @else {
        <polygon class="empty" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      }
    </svg>
  }
</div>
