<div class="wrapper">
  <div class="search" [ngClass]="{'full-height' : itemsList().length === 0}" >
    <div class="input-wrapper">
      <div class="input-container">
        <label for="'search'">Search</label>
        <input [formControl]="searchControl" id="'search'" name="'search'" placeholder="Type to search"/>
      </div>

    </div>

  </div>
  <div class="item-list">
    @for (item of itemsList(); track item) {
      <item-card/>
    }
  </div>
</div>
