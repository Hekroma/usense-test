<div class="wrapper">
  <div class="search" [ngClass]="{'full-height' : !itemsList().length}" >
    <div class="input-wrapper">
      <div class="input-container">
        <label for="'search'">Search</label>
        <input [formControl]="searchControl" id="'search'" name="'search'" placeholder="Type to search"/>
      </div>

    </div>

  </div>

  @if (itemsList().length) {
    <div class="item-list scroll-style">
      @for (item of itemsList(); track item.provider_id) {
        <item-card [item]="item"/>
      }


    </div>
  }
  <div class="pagination">
    @for(page of pagination(); track page.pageNum) {
      <a [class.active]="page.active">{{ page.pageNum }}</a>
    }
  </div>

</div>
